<html lang="en">
<head>
<meta charset="UTF-8"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%232563eb%22/><text x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22>🏠</text></svg>"/>

<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;min-height:100vh;padding-bottom:60px}
  .header{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);padding:18px 16px 0;color:#fff;position:sticky;top:0;z-index:100}
  .header h1{font-size:18px;font-weight:800;margin-bottom:2px}
  .header p{font-size:11px;color:#93c5fd;margin-bottom:12px}
  .tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab-btn{background:transparent;color:#bfdbfe;border:none;border-radius:8px 8px 0 0;padding:9px 13px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .tab-btn.active{background:#fff;color:#2563eb;font-weight:700}
  .content{max-width:600px;margin:0 auto;padding:16px 12px 0}
  .card{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
  .card.accent-blue{border-left:4px solid #2563eb}
  .card.accent-teal{border-left:4px solid #0891b2}
  .card.accent-red{border-left:4px solid #ef4444}
  .card.accent-green{border-left:4px solid #16a34a}
  .card.accent-gray{border-left:4px solid #e2e8f0}
  .card-title{font-weight:700;font-size:14px;color:#1e293b;margin-bottom:12px}
  .stat-row{display:flex;gap:8px;flex-wrap:wrap}
  .stat-box{background:#f8fafc;border-radius:10px;padding:12px 14px;flex:1;min-width:90px}
  .stat-box .lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:3px}
  .stat-box .val{font-size:16px;font-weight:800;color:#1e293b}
  .stat-box .sub{font-size:10px;color:#94a3b8;margin-top:1px}
  .btn-primary{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation}
  .btn-ghost{background:#f1f5f9;color:#475569;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation}
  .btn-full{width:100%;display:block;margin-bottom:12px}
  .btn-danger{background:none;border:none;color:#ef4444;cursor:pointer;font-size:18px;padding:4px 8px;touch-action:manipulation}
  .form-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .inp{border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:14px;outline:none;background:#fff;width:100%;flex:1;min-width:80px;-webkit-appearance:none}
  .inp:focus{border-color:#2563eb}
  select.inp{appearance:none;-webkit-appearance:none}
  .badge{border-radius:99px;padding:3px 10px;font-size:11px;font-weight:600;display:inline-block}
  .badge-green{background:#d1fae5;color:#065f46}
  .badge-red{background:#fee2e2;color:#991b1b}
  .badge-blue{background:#dbeafe;color:#1e40af}
  .progress-wrap{border-radius:99px;height:8px;overflow:hidden;margin-bottom:10px}
  .progress-bar{height:100%;border-radius:99px;transition:width 0.4s}
  .cat-block{border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid transparent}
  .cat-umma{background:#fdf4ff;border-color:#e9d5ff}
  .cat-kuri{background:#fff7ed;border-color:#fed7aa}
  .cat-other{background:#f0fdf4;border-color:#bbf7d0}
  .cat-label-umma{color:#7c3aed;font-weight:700;font-size:12px;margin-bottom:6px}
  .cat-label-kuri{color:#ea580c;font-weight:700;font-size:12px;margin-bottom:6px}
  .cat-label-other{color:#16a34a;font-weight:700;font-size:12px;margin-bottom:6px}
  .two-col{display:flex;gap:8px}
  .two-col > *{flex:1}
  .person-mini{font-size:10px;color:#64748b;margin-bottom:2px}
  .person-val{font-weight:700;font-size:13px}
  .person-inr{font-size:10px;color:#94a3b8}
  .history-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
  .history-row:last-child{border-bottom:none}
  .section-lbl{font-size:11px;color:#64748b;font-weight:600;margin-bottom:6px;margin-top:12px}
  .empty{text-align:center;color:#94a3b8;padding:28px;font-size:13px}
  .loading{text-align:center;padding:60px 20px;color:#94a3b8;font-size:15px}
  .btn-row{display:flex;gap:8px;margin-top:10px}
  .inline-form{margin-top:12px;border-radius:10px;padding:14px}
  .month-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
  .month-title{font-weight:700;font-size:15px;color:#1e293b}
  .month-sub{font-size:11px;color:#94a3b8;margin-top:2px}
  .umma-holding{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .holding-box{flex:1;border-radius:10px;padding:10px 12px;border:1px solid transparent}
  .holding-me{background:#eff6ff;border-color:#bfdbfe}
  .holding-bro{background:#f0fdf4;border-color:#bbf7d0}
  .holding-lbl{font-size:10px;font-weight:700;margin-bottom:3px}
  .holding-lbl-me{color:#2563eb}
  .holding-lbl-bro{color:#16a34a}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <h1>🏠 Home Money Tracker</h1>
      <p>Family finances — ₹ Rupees</p>
    </div>
    <div style="display:flex;gap:6px;margin-top:2px">
      <button onclick="exportBackup()" title="Download backup" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:8px;padding:7px 9px;font-size:14px;cursor:pointer">⬇️</button>
      <button onclick="document.getElementById('import-file').click()" title="Restore backup" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:8px;padding:7px 9px;font-size:14px;cursor:pointer">⬆️</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importBackup(event)"/>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab(0)">Dashboard</button>
    <button class="tab-btn" onclick="switchTab(1)">Home Sending</button>
    <button class="tab-btn" onclick="switchTab(2)">Umma Account</button>
    <button class="tab-btn" onclick="switchTab(3)">3rd Party</button>
  </div>
</div>

<div class="content" id="app">
  <div class="loading">Loading...</div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCsgJxxZHMTLJtoCm885w2YSNimqTM8QXE",
  authDomain: "home-money-fe4c4.firebaseapp.com",
  projectId: "home-money-fe4c4",
  storageBucket: "home-money-fe4c4.firebasestorage.app",
  messagingSenderId: "627357219545",
  appId: "1:627357219545:web:f42a9b0ddb1e2f8bacdcc8"
};
// ─────────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_REF = doc(db, "home-money", "data");
const AED_TO_INR = 22.75;
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let STATE = {
  homeSending: [],
  ummaAccount: [],
  oweTo: { name: "", total: 0, payments: [] },
  oweFrom: { name: "", total: 0, payments: [] }
};
let currentTab = 0;

// ── FIREBASE ─────────────────────────────────────────────────
async function loadData() {
  try {
    const snap = await getDoc(DOC_REF);
    if (snap.exists()) STATE = snap.data();
  } catch(e) { console.error(e); }
  render();
}

async function saveData() {
  try { await setDoc(DOC_REF, STATE); } catch(e) { console.error(e); }
}

// ── HELPERS ──────────────────────────────────────────────────
function inr(amt) { return Math.round(amt).toLocaleString(); }
function aedFmt(n) { return Number(n||0).toLocaleString(); }
function today() { return new Date().toISOString().slice(0,10); }
function uid() { return Date.now() + Math.random().toString(36).slice(2,6); }

function statBox(label, aed, colorClass) {
  return `<div class="stat-box" style="background:${colorClass}">
    <div class="lbl">${label}</div>
    <div class="val">₹${inr(aed)}</div>
  </div>`;
}

function personMini(label, aed) {
  return `<div style="flex:1">
    <div class="person-mini">${label}</div>
    <div class="person-val">₹${inr(aed)}</div>
  </div>`;
}

// ── SWITCH TAB ───────────────────────────────────────────────
window.switchTab = function(i) {
  currentTab = i;
  document.querySelectorAll('.tab-btn').forEach((b,idx) => b.classList.toggle('active', idx===i));
  render();
}

// ── RENDER ───────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (currentTab === 0) app.innerHTML = renderDashboard();
  else if (currentTab === 1) app.innerHTML = renderHomeSending();
  else if (currentTab === 2) app.innerHTML = renderUmmaAccount();
  else if (currentTab === 3) app.innerHTML = renderThirdParty();
  attachHandlers();
}

// ── DASHBOARD ────────────────────────────────────────────────
function renderDashboard() {
  const allCats = STATE.homeSending.flatMap(r => r.categories || [{type:'umma',faizal:r.byMe||0,fahad:r.byBrother||0}]);
  const totalF = allCats.reduce((s,c) => s+(c.faizal||0), 0);
  const totalH = allCats.reduce((s,c) => s+(c.fahad||0), 0);
  const ummaBalance = STATE.ummaAccount.reduce((s,r) => s+(r.type==='deposit'?1:-1)*(r.amount||0), 0);
  const withMe = STATE.ummaAccount.filter(r=>r.type==='withdrawal'&&r.by==='me').reduce((s,r)=>s+r.amount,0);
  const withBro = STATE.ummaAccount.filter(r=>r.type==='withdrawal'&&r.by==='brother').reduce((s,r)=>s+r.amount,0);
  const dashOtherHolders = {};
  STATE.ummaAccount.filter(r=>r.type==='withdrawal'&&r.by==='other').forEach(r=>{
    const n = r.byName || 'Other';
    dashOtherHolders[n] = (dashOtherHolders[n]||0) + r.amount;
  });
  const oweToPaid = STATE.oweTo.payments.reduce((s,r)=>s+(r.amount||0),0);
  const oweFromPaid = STATE.oweFrom.payments.reduce((s,r)=>s+(r.amount||0),0);
  const oweToBalance = (STATE.oweTo.total||0) - oweToPaid;
  const oweFromBalance = (STATE.oweFrom.total||0) - oweFromPaid;

  return `
  <div class="card accent-blue">
    <div class="card-title">🏠 Home Sending</div>
    <div class="stat-row">
      ${statBox('Faizal Sent', totalF, '#eff6ff')}
      ${statBox('Fahad Sent', totalH, '#f0fdf4')}
      ${statBox('Combined', totalF+totalH, '#fdf4ff')}
    </div>
  </div>

  <div class="card accent-teal">
    <div class="card-title">🏦 Umma's Account</div>
    <div class="stat-row">
      ${statBox('Balance', ummaBalance, '#ecfeff')}
      <div class="stat-box" style="background:#f8fafc">
        <div class="lbl">Transactions</div>
        <div class="val">${STATE.ummaAccount.length}</div>
      </div>
    </div>
    ${(withMe>0||withBro>0||Object.keys(dashOtherHolders).length>0)?`
    <div class="section-lbl" style="margin-top:10px">💰 Cash Taken Out</div>
    <div class="stat-row">
      ${withMe>0?statBox('Faizal Took',withMe,'#eff6ff'):''}
      ${withBro>0?statBox('Fahad Took',withBro,'#f0fdf4'):''}
      ${Object.entries(dashOtherHolders).map(([n,a])=>statBox(n+' Took',a,'#fef3c7')).join('')}
    </div>`:''}
  </div>

  <div class="card accent-red">
    <div class="card-title">💸 3rd Party</div>
    <div class="section-lbl">YOU OWE → ${STATE.oweTo.name||'Person A'}</div>
    <div class="stat-row" style="margin-bottom:10px">
      ${statBox('Total Debt', STATE.oweTo.total||0, '#fff7ed')}
      ${statBox('Paid', oweToPaid, '#f0fdf4')}
      ${statBox('Balance', oweToBalance, oweToBalance>0?'#fff1f2':'#f0fdf4')}
    </div>
    <div class="section-lbl">${STATE.oweFrom.name||'Person B'} OWES YOU</div>
    <div class="stat-row">
      ${statBox('Total Owed', STATE.oweFrom.total||0, '#fff7ed')}
      ${statBox('Received', oweFromPaid, '#f0fdf4')}
      ${statBox('To Receive', oweFromBalance, oweFromBalance>0?'#eff6ff':'#f0fdf4')}
    </div>
  </div>`;
}

// ── HOME SENDING ─────────────────────────────────────────────
function renderHomeSending() {
  const allCats = STATE.homeSending.flatMap(r => r.categories || [{type:'umma',faizal:r.byMe||0,fahad:r.byBrother||0}]);
  const totU_F = allCats.filter(c=>c.type==='umma').reduce((s,c)=>s+c.faizal,0);
  const totU_H = allCats.filter(c=>c.type==='umma').reduce((s,c)=>s+c.fahad,0);
  const totK_F = allCats.filter(c=>c.type==='kuri').reduce((s,c)=>s+c.faizal,0);
  const totK_H = allCats.filter(c=>c.type==='kuri').reduce((s,c)=>s+c.fahad,0);
  const totO_F = allCats.filter(c=>c.type==='other').reduce((s,c)=>s+c.faizal,0);
  const totO_H = allCats.filter(c=>c.type==='other').reduce((s,c)=>s+c.fahad,0);
  const grandF = totU_F+totK_F+totO_F;
  const grandH = totU_H+totK_H+totO_H;

  const catSummaryRow = (label, f, h, bg) => (f+h)>0 ? `
    <div style="background:${bg};border-radius:10px;padding:10px 12px;margin-bottom:8px">
      <div style="font-weight:700;font-size:12px;color:#1e293b;margin-bottom:6px">${label}</div>
      <div class="two-col">
        ${personMini('Faizal',f)}
        ${personMini('Fahad',h)}
        ${personMini('Total',f+h)}
      </div>
    </div>` : '';

  const sorted = [...STATE.homeSending].sort((a,b)=>b.year!==a.year?b.year-a.year:b.month-a.month);

  const records = sorted.map(r => {
    const cats = r.categories || [{type:'umma',label:'Umma',faizal:r.byMe||0,fahad:r.byBrother||0}];
    const monthTotal = cats.reduce((s,c)=>s+c.faizal+c.fahad,0);
    const catsHtml = cats.map(c => `
      <div class="cat-block cat-${c.type}">
        <div class="cat-label-${c.type}">${c.label}</div>
        <div class="two-col">
          ${personMini('Faizal',c.faizal)}
          ${personMini('Fahad',c.fahad)}
        </div>
      </div>`).join('');
    return `
    <div class="card accent-gray">
      <div class="month-card-header">
        <div>
          <div class="month-title">${MONTHS[r.month]} ${r.year}</div>
          <div class="month-sub">Total: ₹${inr(monthTotal)}</div>
        </div>
        <button class="btn-danger" onclick="deleteHomeSending('${r.id}')">✕</button>
      </div>
      ${catsHtml}
    </div>`;
  }).join('');

  return `
  <div class="card accent-blue">
    <div class="card-title">📊 All Time Summary</div>
    ${catSummaryRow('🏠 Umma', totU_F, totU_H, '#fdf4ff')}
    ${catSummaryRow('🎰 Kuri', totK_F, totK_H, '#fff7ed')}
    ${catSummaryRow('📦 Others', totO_F, totO_H, '#f0fdf4')}
    <div class="stat-row" style="margin-top:6px">
      ${statBox('Faizal Total', grandF, '#eff6ff')}
      ${statBox('Fahad Total', grandH, '#f0fdf4')}
    </div>
  </div>

  <button class="btn-primary btn-full" onclick="showAddMonth()">+ Add Month</button>
  <div id="add-month-form"></div>
  ${records}
  ${sorted.length===0?'<div class="empty">No records yet. Add your first month.</div>':''}`;
}

window.showAddMonth = function() {
  const now = new Date();
  const monthOpts = MONTHS.map((m,i)=>`<option value="${i}"${i===now.getMonth()?' selected':''}>${m}</option>`).join('');
  document.getElementById('add-month-form').innerHTML = `
  <div class="card accent-blue">
    <div class="card-title">Add Month Entry</div>
    <div class="form-row">
      <select class="inp" id="fm-month">${monthOpts}</select>
      <input class="inp" type="number" id="fm-year" value="${now.getFullYear()}" style="max-width:90px"/>
    </div>
    <div id="fm-cats">
      <div class="cat-block cat-umma" id="cat-umma">
        <div class="cat-label-umma">Umma</div>
        <div class="form-row">
          <input class="inp" type="number" placeholder="Faizal (₹)" id="umma-faizal"/>
          <input class="inp" type="number" placeholder="Fahad (₹)" id="umma-fahad"/>
        </div>
      </div>
      <div class="cat-block cat-kuri" id="cat-kuri">
        <div class="cat-label-kuri">Kuri</div>
        <div class="form-row">
          <input class="inp" type="number" placeholder="Faizal (₹)" id="kuri-faizal"/>
          <input class="inp" type="number" placeholder="Fahad (₹)" id="kuri-fahad"/>
        </div>
      </div>
      <div id="other-cats"></div>
    </div>
    <button class="btn-ghost" onclick="addOtherCat()" style="width:100%;margin-bottom:10px;margin-top:4px">+ Add Other Category</button>
    <div class="btn-row">
      <button class="btn-primary" onclick="saveMonth()">Save</button>
      <button class="btn-ghost" onclick="document.getElementById('add-month-form').innerHTML=''">Cancel</button>
    </div>
  </div>`;
}

let otherCatCount = 0;
window.addOtherCat = function() {
  otherCatCount++;
  const id = 'oc'+otherCatCount;
  const div = document.createElement('div');
  div.className='cat-block cat-other'; div.id=id;
  div.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <input class="inp" placeholder="Category name" id="${id}-label" style="flex:1;margin-right:8px"/>
      <button class="btn-danger" onclick="document.getElementById('${id}').remove()">✕</button>
    </div>
    <div class="form-row">
      <input class="inp" type="number" placeholder="Faizal (₹)" id="${id}-faizal"/>
      <input class="inp" type="number" placeholder="Fahad (₹)" id="${id}-fahad"/>
    </div>`;
  document.getElementById('other-cats').appendChild(div);
}

window.saveMonth = function() {
  const month = parseInt(document.getElementById('fm-month').value);
  const year = parseInt(document.getElementById('fm-year').value);
  const categories = [];
  const ummaF = parseFloat(document.getElementById('umma-faizal').value)||0;
  const ummaH = parseFloat(document.getElementById('umma-fahad').value)||0;
  if(ummaF||ummaH) categories.push({type:'umma',label:'Umma',faizal:ummaF,fahad:ummaH});
  const kuriF = parseFloat(document.getElementById('kuri-faizal').value)||0;
  const kuriH = parseFloat(document.getElementById('kuri-fahad').value)||0;
  if(kuriF||kuriH) categories.push({type:'kuri',label:'Kuri',faizal:kuriF,fahad:kuriH});
  document.querySelectorAll('[id^="oc"]').forEach(el => {
    if(!el.id.includes('-')) {
      const lbl = document.getElementById(el.id+'-label')?.value||'Other';
      const f = parseFloat(document.getElementById(el.id+'-faizal')?.value)||0;
      const h = parseFloat(document.getElementById(el.id+'-fahad')?.value)||0;
      if(f||h) categories.push({type:'other',label:lbl,faizal:f,fahad:h});
    }
  });
  if(!categories.length) return alert('Please enter at least one amount.');
  STATE.homeSending.push({id:uid(), month, year, categories});
  saveData(); render();
}

window.deleteHomeSending = function(id) {
  if(!confirm('Delete this record?')) return;
  STATE.homeSending = STATE.homeSending.filter(r=>r.id!==id);
  saveData(); render();
}

// ── UMMA ACCOUNT ─────────────────────────────────────────────
function renderUmmaAccount() {
  const balance = STATE.ummaAccount.reduce((s,r)=>s+(r.type==='deposit'?1:-1)*(r.amount||0),0);
  const withMe = STATE.ummaAccount.filter(r=>r.type==='withdrawal'&&r.by==='me').reduce((s,r)=>s+r.amount,0);
  const withBro = STATE.ummaAccount.filter(r=>r.type==='withdrawal'&&r.by==='brother').reduce((s,r)=>s+r.amount,0);
  const otherHolders = {};
  STATE.ummaAccount.filter(r=>r.type==='withdrawal'&&r.by==='other').forEach(r=>{
    const n = r.byName || 'Other';
    otherHolders[n] = (otherHolders[n]||0) + r.amount;
  });
  const sorted = [...STATE.ummaAccount].sort((a,b)=>b.date.localeCompare(a.date));

  const rows = sorted.map(r=>{
    const whoLabel = r.by==='me' ? 'Faizal' : r.by==='brother' ? 'Fahad' : (r.byName || 'Other');
    return `
    <div class="card accent-${r.type==='deposit'?'green':'red'}" style="padding:12px 14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px">
            <span class="badge badge-${r.type==='deposit'?'green':'red'}">${r.type==='deposit'?'↑ Deposit':'↓ Withdrawal'}</span>
            <span class="badge badge-blue">${whoLabel}</span>
            ${r.bank?`<span style="font-size:11px;color:#64748b">${r.bank}</span>`:''}
          </div>
          <div style="font-weight:700;font-size:15px">₹${inr(r.amount)}</div>
          <div style="font-size:11px;color:#94a3b8">${r.date}</div>
          ${r.note?`<div style="font-size:11px;color:#64748b;margin-top:2px">${r.note}</div>`:''}
        </div>
        <button class="btn-danger" onclick="deleteUmma('${r.id}')">✕</button>
      </div>
    </div>`;
  }).join('');

  const otherHoldingBoxes = Object.entries(otherHolders).map(([n,a])=>`
    <div class="holding-box" style="background:#fef3c7;border-color:#fde68a">
      <div class="holding-lbl" style="color:#92400e">👤 ${n.toUpperCase()} TOOK</div>
      <div style="font-weight:800;font-size:16px">₹${inr(a)}</div>
    </div>`).join('');

  return `
  <div class="card accent-teal">
    <div class="card-title">🏦 Account Overview</div>
    <div class="stat-row">
      ${statBox('Account Balance', balance, '#ecfeff')}
    </div>
    ${(withMe>0||withBro>0||Object.keys(otherHolders).length>0)?`
    <div class="section-lbl">💰 Cash Taken Out — Who Has It</div>
    <div class="umma-holding">
      ${withMe>0?`<div class="holding-box holding-me">
        <div class="holding-lbl holding-lbl-me">👤 FAIZAL TOOK</div>
        <div style="font-weight:800;font-size:16px">₹${inr(withMe)}</div>
      </div>`:''}
      ${withBro>0?`<div class="holding-box holding-bro">
        <div class="holding-lbl holding-lbl-bro">👤 FAHAD TOOK</div>
        <div style="font-weight:800;font-size:16px">₹${inr(withBro)}</div>
      </div>`:''}
      ${otherHoldingBoxes}
    </div>`:''}
  </div>

  <button class="btn-primary btn-full" onclick="showAddUmma()">+ Add Transaction</button>
  <div id="add-umma-form"></div>
  ${rows}
  ${sorted.length===0?'<div class="empty">No transactions yet.</div>':''}`;
}

window.showAddUmma = function() {
  document.getElementById('add-umma-form').innerHTML = `
  <div class="card accent-teal">
    <div class="card-title">Add Transaction</div>
    <div class="form-row">
      <input class="inp" type="date" id="ua-date" value="${today()}"/>
      <select class="inp" id="ua-type">
        <option value="deposit">Deposit</option>
        <option value="withdrawal">Withdrawal</option>
      </select>
    </div>
    <div class="form-row">
      <input class="inp" type="number" placeholder="Amount (₹)" id="ua-amount"/>
      <select class="inp" id="ua-by" onchange="toggleOtherName()">
        <option value="me">Faizal</option>
        <option value="brother">Fahad</option>
        <option value="other">Other (custom)</option>
      </select>
    </div>
    <div id="ua-other-name-wrap" style="display:none;margin-bottom:8px">
      <input class="inp" placeholder="Person's name" id="ua-by-name"/>
    </div>
    <input class="inp" placeholder="Bank name" id="ua-bank" style="margin-bottom:8px"/>
    <input class="inp" placeholder="Note (optional)" id="ua-note"/>
    <div class="btn-row">
      <button class="btn-primary" onclick="saveUmma()">Save</button>
      <button class="btn-ghost" onclick="document.getElementById('add-umma-form').innerHTML=''">Cancel</button>
    </div>
  </div>`;
}

window.toggleOtherName = function() {
  const wrap = document.getElementById('ua-other-name-wrap');
  const val = document.getElementById('ua-by').value;
  wrap.style.display = val === 'other' ? 'block' : 'none';
}

window.saveUmma = function() {
  const amount = parseFloat(document.getElementById('ua-amount').value)||0;
  if(!amount) return alert('Enter an amount.');
  const by = document.getElementById('ua-by').value;
  let byName = '';
  if (by === 'other') {
    byName = document.getElementById('ua-by-name').value.trim();
    if (!byName) return alert("Please enter the person's name.");
  }
  STATE.ummaAccount.push({
    id:uid(),
    date:document.getElementById('ua-date').value,
    amount,
    type:document.getElementById('ua-type').value,
    by,
    byName,
    bank:document.getElementById('ua-bank').value,
    note:document.getElementById('ua-note').value
  });
  saveData(); render();
}

window.deleteUmma = function(id) {
  if(!confirm('Delete this transaction?')) return;
  STATE.ummaAccount = STATE.ummaAccount.filter(r=>r.id!==id);
  saveData(); render();
}

// ── THIRD PARTY ──────────────────────────────────────────────
function renderThirdParty() {
  const oweToPaid = STATE.oweTo.payments.reduce((s,r)=>s+(r.amount||0),0);
  const oweFromPaid = STATE.oweFrom.payments.reduce((s,r)=>s+(r.amount||0),0);
  const oweToBalance = (STATE.oweTo.total||0) - oweToPaid;
  const oweFromBalance = (STATE.oweFrom.total||0) - oweFromPaid;
  const otPct = STATE.oweTo.total>0 ? Math.min(100,(oweToPaid/STATE.oweTo.total)*100) : 0;
  const ofPct = STATE.oweFrom.total>0 ? Math.min(100,(oweFromPaid/STATE.oweFrom.total)*100) : 0;

  const oweToRows = [...STATE.oweTo.payments].sort((a,b)=>b.date.localeCompare(a.date)).map(p=>`
    <div class="history-row">
      <div><span style="color:#16a34a;font-weight:700">₹${inr(p.amount)}</span> <span style="color:#94a3b8">· ${p.date}</span>${p.note?` <span style="color:#64748b">· ${p.note}</span>`:''}</div>
      <button class="btn-danger" onclick="deletePayment('oweTo','${p.id}')">✕</button>
    </div>`).join('');

  const oweFromRows = [...STATE.oweFrom.payments].sort((a,b)=>b.date.localeCompare(a.date)).map(p=>`
    <div class="history-row">
      <div><span style="color:#2563eb;font-weight:700">₹${inr(p.amount)}</span> <span style="color:#94a3b8">· ${p.date}</span>${p.note?` <span style="color:#64748b">· ${p.note}</span>`:''}</div>
      <button class="btn-danger" onclick="deletePayment('oweFrom','${p.id}')">✕</button>
    </div>`).join('');

  return `
  <!-- YOU OWE -->
  <div class="card accent-red">
    <div class="card-title">🔴 You Owe → ${STATE.oweTo.name||'Person A'}</div>
    <div id="oto-setup">
      <div class="stat-row" style="margin-bottom:10px">
        ${statBox('Total Debt', STATE.oweTo.total||0, '#fff7ed')}
        ${statBox('Paid', oweToPaid, '#f0fdf4')}
        ${statBox('Balance', oweToBalance, oweToBalance>0?'#fff1f2':'#f0fdf4')}
      </div>
      ${STATE.oweTo.total>0?`<div class="progress-wrap" style="background:#fee2e2">
        <div class="progress-bar" style="background:#16a34a;width:${otPct}%"></div>
      </div>`:''}
      <div class="btn-row">
        <button class="btn-ghost" onclick="showEditSetup('oweTo')">Edit Setup</button>
        <button class="btn-primary" onclick="showLogPayment('oweTo')">+ Log Payment</button>
      </div>
    </div>
    <div id="oto-edit-form"></div>
    <div id="oto-pay-form"></div>
    ${oweToRows?`<div class="section-lbl">Payment History</div>${oweToRows}`:''}
  </div>

  <!-- THEY OWE -->
  <div class="card accent-green">
    <div class="card-title">🟢 ${STATE.oweFrom.name||'Person B'} Owes You</div>
    <div id="ofr-setup">
      <div class="stat-row" style="margin-bottom:10px">
        ${statBox('Total Owed', STATE.oweFrom.total||0, '#fff7ed')}
        ${statBox('Received', oweFromPaid, '#f0fdf4')}
        ${statBox('To Receive', oweFromBalance, oweFromBalance>0?'#eff6ff':'#f0fdf4')}
      </div>
      ${STATE.oweFrom.total>0?`<div class="progress-wrap" style="background:#dcfce7">
        <div class="progress-bar" style="background:#2563eb;width:${ofPct}%"></div>
      </div>`:''}
      <div class="btn-row">
        <button class="btn-ghost" onclick="showEditSetup('oweFrom')">Edit Setup</button>
        <button class="btn-primary" onclick="showLogPayment('oweFrom')">+ Log Payment Received</button>
      </div>
    </div>
    <div id="ofr-edit-form"></div>
    <div id="ofr-pay-form"></div>
    ${oweFromRows?`<div class="section-lbl">Payment History</div>${oweFromRows}`:''}
  </div>`;
}

window.showEditSetup = function(section) {
  const s = STATE[section];
  const formId = section==='oweTo'?'oto-edit-form':'ofr-edit-form';
  const isOwe = section==='oweTo';
  document.getElementById(formId).innerHTML = `
  <div class="inline-form" style="background:${isOwe?'#fef2f2':'#f0fdf4'};margin-top:10px">
    <div style="font-weight:600;margin-bottom:8px">Setup</div>
    <input class="inp" placeholder="Name" id="${section}-name" value="${s.name||''}" style="margin-bottom:8px"/>
    <input class="inp" type="number" placeholder="Total amount (₹)" id="${section}-total" value="${s.total||''}"/>
    <div class="btn-row">
      <button class="btn-primary" onclick="saveSetup('${section}')">Save</button>
      <button class="btn-ghost" onclick="document.getElementById('${formId}').innerHTML=''">Cancel</button>
    </div>
  </div>`;
}

window.saveSetup = function(section) {
  const name = document.getElementById(section+'-name').value;
  const total = parseFloat(document.getElementById(section+'-total').value)||0;
  STATE[section].name = name;
  STATE[section].total = total;
  saveData(); render();
}

window.showLogPayment = function(section) {
  const formId = section==='oweTo'?'oto-pay-form':'ofr-pay-form';
  const isOwe = section==='oweTo';
  document.getElementById(formId).innerHTML = `
  <div class="inline-form" style="background:${isOwe?'#fef2f2':'#f0fdf4'};margin-top:10px">
    <div style="font-weight:600;margin-bottom:8px">${isOwe?'Log Payment':'Log Payment Received'}</div>
    <div class="form-row">
      <input class="inp" type="date" id="${section}-pay-date" value="${today()}"/>
      <input class="inp" type="number" placeholder="Amount (₹)" id="${section}-pay-amount"/>
    </div>
    <input class="inp" placeholder="Note (optional)" id="${section}-pay-note"/>
    <div class="btn-row">
      <button class="btn-primary" onclick="savePayment('${section}')">Save</button>
      <button class="btn-ghost" onclick="document.getElementById('${formId}').innerHTML=''">Cancel</button>
    </div>
  </div>`;
}

window.savePayment = function(section) {
  const amount = parseFloat(document.getElementById(section+'-pay-amount').value)||0;
  if(!amount) return alert('Enter an amount.');
  STATE[section].payments.push({
    id:uid(),
    date:document.getElementById(section+'-pay-date').value,
    amount,
    note:document.getElementById(section+'-pay-note').value
  });
  saveData(); render();
}

window.deletePayment = function(section, id) {
  if(!confirm('Delete this payment?')) return;
  STATE[section].payments = STATE[section].payments.filter(p=>p.id!==id);
  saveData(); render();
}

function attachHandlers() {}

// ── BACKUP: EXPORT / IMPORT ─────────────────────────────────
window.exportBackup = function() {
  const blob = new Blob([JSON.stringify(STATE, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `home-money-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

window.importBackup = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!confirm('This will REPLACE all current data with the backup file. Continue?')) {
        event.target.value = '';
        return;
      }
      STATE = {
        homeSending: parsed.homeSending || [],
        ummaAccount: parsed.ummaAccount || [],
        oweTo: parsed.oweTo || { name:'', total:0, payments:[] },
        oweFrom: parsed.oweFrom || { name:'', total:0, payments:[] }
      };
      await saveData();
      render();
      alert('Backup restored successfully.');
    } catch(err) {
      alert('Invalid backup file.');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── START ─────────────────────────────────────────────────────
loadData();
